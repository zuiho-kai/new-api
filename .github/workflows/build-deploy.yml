name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: new-api-custom
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/new-api-custom:latest
            ghcr.io/${{ github.repository_owner }}/new-api-custom:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: GH_TOKEN
          script: |
            echo "$GH_TOKEN" | docker login ghcr.io -u zuiho-kai --password-stdin
            docker pull ghcr.io/zuiho-kai/new-api-custom:latest
            cd /opt/new-api
            sed -i 's|image: calciumion/new-api:latest|image: ghcr.io/zuiho-kai/new-api-custom:latest|g' docker-compose.yml
            docker compose up -d new-api
            sleep 5
            if docker ps | grep -q new-api; then
              echo "Deploy success!"
            else
              echo "Deploy failed, rolling back..."
              sed -i 's|image: ghcr.io/zuiho-kai/new-api-custom:latest|image: calciumion/new-api:latest|g' docker-compose.yml
              docker compose up -d new-api
              exit 1
            fi
